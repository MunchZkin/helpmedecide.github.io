<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Help Me Decide</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/shadowEffect.css">
    <link rel="stylesheet" href="css/inputBox.css">
    <style>
        body {
            background-color: #0d010f;
            color: #EBB9F7;
            margin: 0;
            padding: 0;
            font-family: system-ui, sans-serif;
        }

        /* header container with configurable left indent */
        .header {
            --header-indent: 1rem;
            position: fixed;
            top: 0;
            left: 0;
            padding: 1rem 1rem 0 var(--header-indent);
            z-index: 1000;
            text-align: left;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5rem;
            line-height: 1;
            white-space: nowrap;
        }

        /* subtitle base (italic) */
        .subtitle {
            margin: 0.25rem 0 0 0;
            font-style: italic;
            font-size: 1rem;
            opacity: 0.95;
        }

        /* main content spacing so fixed header doesn't cover it */
        .content {
            padding-top: 6rem; /* default spacing under header */
            padding-left: var(--header-indent, 1rem);
            padding-right: 1rem;
        }

        .inputs-row {
            display: flex;
            gap: 4ch;
            align-items: flex-end;
            flex-wrap: wrap;
            max-width: 70ch;
        }

        .inputs-row .form-control {
            flex: 1 1 0;
            max-width: none;
            min-width: 30ch; /* ensure inputs can show up to 30 characters */
        }

        /* Desktop overrides */
        @media (min-width: 768px) {
            .header {
                --header-indent: 2rem;
                padding-top: 2rem;
                padding-right: 2rem;
            }

            .header h1 {
                font-size: 5.5rem;
            }

            .subtitle {
                font-size: 2.25rem;
            }
            .content {
                padding-top: 8rem;
            }
        }

        /* Mobile overrides */
        @media (max-width: 767px) {
            .header {
                --header-indent: 1rem;
                padding-top: 1rem;
                padding-right: 1rem;
            }

            .header h1 {
                font-size: 3.8rem;
            }

            .subtitle {
                font-size: 1.8rem;
            }
                        .content {
                                padding-top: 5.5rem;
                        }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="highlighted-text-shadow">Decide Without Delay</h1>
        <p class="subtitle highlighted-text-shadow">The universe chose serenity for your question: how should I proceed?</p>
    </div>

        <main class="content">
                <div class="inputs-row">
                        <div class="form-control">
                                <input
                                        id="optionAInput"
                                        type="text"
                                        required
                                        placeholder="Stay in the familiar?"
                                        class="input input-alt"
                                />
                                <span class="input-border input-border-alt"></span>
                        </div>

                        <div class="form-control">
                                <input
                                        id="optionBInput"
                                        type="text"
                                        placeholder="Leap into the unknown?"
                                        class="input input-alt"
                                />
                                <span class="input-border input-border-alt"></span>
                        </div>
                </div>
        </main>

        <script>
            (function () {
                const inputs = Array.from(document.querySelectorAll('.inputs-row .input'));
                if (!inputs.length) return;

                const sizers = new Map();

                inputs.forEach((input) => {
                    const sizer = document.createElement('span');
                    sizer.style.position = 'absolute';
                    sizer.style.visibility = 'hidden';
                    sizer.style.whiteSpace = 'pre';
                    sizer.style.font = window.getComputedStyle(input).font;
                    document.body.appendChild(sizer);
                    sizers.set(input, sizer);

                    const resize = () => {
                        const text = input.value || input.placeholder || '';
                        sizer.textContent = text;
                        let width = sizer.offsetWidth + 24; // padding/caret room

                        const container = input.closest('.form-control');
                        if (container) {
                            const max = container.clientWidth;
                            width = Math.min(width, max);
                        }

                        input.style.width = width + 'px';
                    };

                    input.addEventListener('input', resize);
                    window.addEventListener('resize', resize);
                    resize();
                });
            })();
        </script>
</body>
</html>
