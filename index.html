<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Help Me Decide</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/shadowEffect.css">
    <style>
        body {
            background-color: #0d010f;
            margin: 0;
            padding: 0;
            font-family: system-ui, sans-serif;
        }

        /* header container with configurable left indent */
        .header {
            --header-indent: 1rem;
            position: fixed;
            top: 0;
            left: 0;
            padding: 1rem 1rem 0 var(--header-indent);
            z-index: 1000;
            text-align: left;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5rem;
            line-height: 1;
            white-space: nowrap;
        }

        /* subtitle base (italic) */
        .subtitle {
            margin: 0.25rem 0 0 0;
            font-style: italic;
            font-size: 1rem;
            opacity: 0.95;
        }

        /* Desktop overrides */
        @media (min-width: 768px) {
            .header {
                --header-indent: 2rem;
                padding-top: 2rem;
                padding-right: 2rem;
            }

            .header h1 {
                font-size: 5.5rem;
            }

            .subtitle {
                font-size: 2.25rem;
            }
        }

        /* Mobile overrides */
        @media (max-width: 767px) {
            .header {
                --header-indent: 1rem;
                padding-top: 1rem;
                padding-right: 1rem;
            }

            .header h1 {
                font-size: 3.8rem;
            }

            .subtitle {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="highlighted-text-shadow">Decide Without Delay</h1>
        <p class="subtitle highlighted-text-shadow">The universe chose serenity for your question: how should I proceed?</p>
    </div>
</body>
</html>
