<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Help Me Decide</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/shadowEffect.css">
    <style>
        body {
            background-color: #0d010f;
            margin: 0;
            padding: 0;
            font-family: system-ui, sans-serif;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            padding: 1rem;
            z-index: 1000;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5rem;
            white-space: nowrap;
        }

        /* Desktop */
        @media (min-width: 768px) {
            .header {
                padding: 2rem;
            }

            .header h1 {
                font-size: 3.5rem;
            }
        }

        /* Mobile */
        @media (max-width: 767px) {
            .header {
                padding: 1rem;
            }

            .header h1 {
                font-size: 2.25rem;
                line-height: 1.2;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="highlighted-text-shadow">Decide Without Delay</h1>
    </div>
</body>
</html>
